name: guestbook
on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

concurrency:
  group: readme-writes

jobs:
  sign:
    if: startsWith(github.event.issue.title, 'wall|')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: append entry + rebuild profile
        env:
          WALL_USER: ${{ github.event.issue.user.login }}
          WALL_TITLE: ${{ github.event.issue.title }}
        run: python scripts/guestbook.py
      - name: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/wall.json assets/profile-dark.svg assets/profile-light.svg
          git diff --cached --quiet && exit 0
          git commit -m "wall: new entry [skip ci]"
          git pull --rebase origin main
          git push
      - name: close issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue close ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --comment "signed. the wall (inside the profile image) updates within a couple minutes. thanks @${{ github.event.issue.user.login }}"
