name: snake
on:
  schedule:
    - cron: "45 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snake:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: dahan8473
          outputs: |
            dist/snake-dark.svg?palette=github-dark&color_snake=#3fdd78
            dist/snake-light.svg?palette=github-light&color_snake=#1a7f37
      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
