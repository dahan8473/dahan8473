name: telemetry
on:
  schedule:
    - cron: "15 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: readme-writes

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --quiet pillow numpy
      - name: fetch live stats
        env:
          GH_TOKEN: ${{ secrets.PROFILE_PAT || github.token }}
        run: python scripts/fetch_stats.py
      - name: rebuild banner and headers
        run: |
          python scripts/build_banner.py
          python scripts/build_headers.py
      - name: commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets scripts/stats.json
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "telemetry: refresh banner [skip ci]"
          git push
