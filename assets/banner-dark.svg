<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 340" font-family="ui-monospace,'SF Mono',Menlo,Consolas,'Liberation Mono',monospace">
  <style>
    .h    { fill:#56d364; font-size:13px; }
    .dim  { fill:#3fa060; font-size:13px; }
    .menu { fill:#2e5c41; font-size:12px; letter-spacing:2px; }
    .sel  { fill:#7ee787; font-size:12px; letter-spacing:2px; }
    .px   { fill:#3fdd78; }
    .ok   { fill:#7ee787; font-size:14px; opacity:0; animation:on .01s steps(1) forwards; }
    .okb  { fill:#3fdd78; }
    .d1   { animation-delay:1.0s; }
    .d2   { animation-delay:1.2s; }
    .d3   { animation-delay:1.4s; }
    .d4   { animation-delay:1.6s; }
    .cur  { fill:#7ee787; font-size:14px; opacity:0;
            animation:on .01s steps(1) 1.7s forwards, blink 1.1s steps(1) 1.8s infinite; }
    .glitch { animation:glitch 7s steps(1) 3s infinite; }
    .sweep  { animation:sweep 9s linear infinite; }
    @keyframes on    { to { opacity:1; } }
    @keyframes blink { 50% { opacity:0; } }
    @keyframes glitch {
      0%   { transform:translate(0,0); }
      96.5%{ transform:translate(0,0); }
      97%  { transform:translate(3px,-1px); }
      97.5%{ transform:translate(-3px,1px); }
      98%  { transform:translate(0,0); }
      100% { transform:translate(0,0); }
    }
    @keyframes sweep {
      from { transform:translateY(-40px); }
      to   { transform:translateY(350px); }
    }
  </style>
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <clipPath id="reveal">
      <rect x="40" y="70" width="880" height="150">
        <animate attributeName="width" values="0;880" dur=".9s" begin="0.3s" fill="freeze"/>
      </rect>
    </clipPath>
    <linearGradient id="scan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7ee787" stop-opacity="0"/>
      <stop offset=".5" stop-color="#7ee787" stop-opacity=".07"/>
      <stop offset="1" stop-color="#7ee787" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <text class="h" x="36" y="26" xml:space="preserve">DAVIDLIU BIOS (TM)  COPYRIGHT (C) 2026</text>
  <text class="dim" x="924" y="26" text-anchor="end" xml:space="preserve">PORT......3000</text>
